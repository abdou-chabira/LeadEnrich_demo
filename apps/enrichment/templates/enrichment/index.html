<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lead Enrichment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body.dark-theme {
            background-color: #0a1931 !important;
            color: #e0e6ed !important;
        }

        .dark-theme .container {
            background-color: #13204a !important;
            border-radius: 10px;
            padding: 2rem;
        }

        .dark-theme .form-control,
        .dark-theme .form-label {
            background-color: #1b263b !important;
            color: #e0e6ed !important;
        }

        .dark-theme .btn-primary {
            background-color: #185adb !important;
            border-color: #185adb !important;
        }

        .dark-theme .btn-secondary,
        .dark-theme .btn-info {
            background-color: #10316b !important;
            border-color: #10316b !important;
        }
    </style>
</head>

<body class="p-4" id="mainBody">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Lead Enrichment</h1>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="themeSwitch">
                <label class="form-check-label" for="themeSwitch" id="themeSwitchLabel">Dark Theme</label>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary">Enrich Lead</button>
        </form>
        <hr>
        <a href="{% url 'results' %}" class="btn btn-secondary">View Recent Leads</a>
        <a href="{% url 'monitoring' %}" class="btn btn-info ms-2">System Monitoring</a>
    </div>
    <script>
        const themeSwitch = document.getElementById('themeSwitch');
        const body = document.getElementById('mainBody');
        const label = document.getElementById('themeSwitchLabel');
        themeSwitch.addEventListener('change', function () {
            body.classList.toggle('dark-theme');
            if (body.classList.contains('dark-theme')) {
                label.textContent = 'Light Theme';
            } else {
                label.textContent = 'Dark Theme';
            }
        });
    </script>
</body>

</html>
